# Fine-tuning do AdaPoinTr pré-treinado no ShapeNet-55
# para o dataset arqueológico de urnas amazônicas

optimizer : {
  type: AdamW,
  kwargs: {
  lr : 0.00001,       # lr menor que o original (0.0001) para fine-tuning
  weight_decay : 0.05
}}

scheduler: {
  type: CosLR,
  kwargs: {
    epochs: 300,
    initial_epochs: 10,
    lowest_decay: 0.02  # Mantém um aprendizado mínimo até a época 300
}}

bnmscheduler: {
  type: Lambda,
  kwargs: {
  decay_step: 21,
  bn_decay: 0.5,
  bn_momentum: 0.9,
  lowest_decay: 0.01
}}

dataset : {
  train : { _base_: cfgs/dataset_configs/Arqueo.yaml,
            others: {subset: 'train'}},
  val :   { _base_: cfgs/dataset_configs/Arqueo.yaml,
            others: {subset: 'test'}},
  test :  { _base_: cfgs/dataset_configs/Arqueo.yaml,
            others: {subset: 'test'}}}

model : {
    NAME: AdaPoinTr,
    num_query: 512,
    num_points: 8192,
    center_num: [512, 256],
    global_feature_dim: 1024,
    encoder_type: graph,
    decoder_type: fc,
    encoder_config: {
      embed_dim: 384,
      depth: 6,
      num_heads: 6,
      k: 8,
      n_group: 2,
      mlp_ratio: 2.,
      block_style_list: ['attn-graph', 'attn', 'attn', 'attn', 'attn', 'attn'],
      combine_style: 'concat',
    },
    decoder_config: {
      embed_dim: 384,
      depth: 8,
      num_heads: 6,
      k: 8,
      n_group: 2,
      mlp_ratio: 2.,
      self_attn_block_style_list: ['attn-graph', 'attn', 'attn', 'attn', 'attn', 'attn', 'attn', 'attn'],
      self_attn_combine_style: 'concat',
      cross_attn_block_style_list: ['attn-graph', 'attn', 'attn', 'attn', 'attn', 'attn', 'attn', 'attn'],
      cross_attn_combine_style: 'concat',
    }
}

# Pesos pré-treinados AdaPoinTr_ps55.pth como ponto de partida
pretrained_ckpt: ../../../modelos_treinados/AdaPoinTr_ps55.pth

total_bs : 32        # batch menor — dataset pequeno
step_per_update : 1
max_epoch : 300     # menos épocas para fine-tuning

consider_metric: CDL1
